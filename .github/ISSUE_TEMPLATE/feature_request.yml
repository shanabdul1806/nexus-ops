name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Nexus Ops better? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it improve?
      placeholder: I often need to... but currently I have to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see added or changed.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New connector / integration
        - AI / Query improvements
        - Alert rules
        - Dashboard UI
        - Chrome Extension
        - API
        - Docker / Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to implement this?
      options:
        - label: I am willing to submit a pull request for this feature
