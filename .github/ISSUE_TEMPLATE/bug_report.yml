name: Bug Report
description: Something is broken or not working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start backend with `docker compose up`
        2. Open dashboard at localhost:3000
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output from the browser console or backend logs.
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend API
        - React Dashboard
        - Chrome Extension
        - Alert Monitor
        - AI / Query
        - AWS Connector
        - GCP Connector
        - Azure Connector
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "e.g. latest, v1.2.0, or git SHA"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: Windows 11 / Ubuntu 22.04 / macOS 14
        Node: 20.x
        Docker: 24.x
        Browser: Chrome 123
